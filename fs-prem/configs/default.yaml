# FS-PREM Default Configuration

data:
  ibtracs_path: "data/raw/ibtracs_gulf_2023_2024.csv"
  ais_path: "data/raw/master_port_storm_dataset_portex_encoded.csv"
  ports:
    - Houston
    - New_Orleans
    - Mobile
    - Tampa
    - Corpus_Christi

portex:
  weights:
    hazard_proximity: 0.5
    uncertainty: 0.2
    exposure: 0.2
    vulnerability: 0.1
  thresholds:
    event_percentile: 0.95       # primary label threshold
    alt_low: 0.90                # sensitivity analysis
    alt_high: 0.97               # sensitivity analysis

models:
  random_state: 42
  portex_glm:
    penalty: "l1"
    C: 1.0
    max_iter: 1000
  random_forest:
    n_estimators: 100
    max_depth: 8
  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.05
  compact_gru:
    hidden_dim: 8
    dropout: 0.2
    epochs: 50
    batch_size: 32
  compact_conv1d:
    filters: 8
    kernel_size: 3
    dropout: 0.2
    epochs: 50
    batch_size: 32

conformal:
  alpha_values: [0.05, 0.10]
  window_sizes: [60, 80, 100, 120, 144]

evaluation:
  cv_strategy: "loso"           # leave-one-storm-out
  metrics:
    - auc
    - pr_auc
    - precision
    - recall
    - f1
